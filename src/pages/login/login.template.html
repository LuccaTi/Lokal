<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="assets/icons/record-svgrepo-com.svg">
    <title>Fazer login no Lokal</title>
</head>

<body>
    <div class="container">
        <main class="content-main">
            <div class="logo-wrapper">
                <a href="index.html"><img src="assets/images/Lokal-no-background.png" alt="Lokal logo"></a>
            </div>
            <h1>
                Bem vindo(a) de volta!
            </h1>
            <form action="" id="login-form" novalidate>
                <div class="form-field">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="Insira seu email..." required autocomplete="email">
                </div>

                <div class="form-field">
                    <label for="password">Senha</label>
                    <input type="password" id="password" name="password" placeholder="Insira sua senha..." minlength="6"
                        required autocomplete="current-password">
                </div>
                <button type="submit" id="login-form-button">Login</button>
                <p>Não tem uma conta ainda? <a href="signup.html" id="signup-link">Cadastre-se</a></p>
            </form>
        </main>

        <aside class="content-image-wrapper">
            <figure>
                <img src="assets/images/login.png" alt="Login">
                <figcaption>
                    Image by <a href="https://www.flaticon.com/authors/vectorsmarket15"
                        target="_blank" id="img-author-link">vectorsmarket15</a>
                </figcaption>
            </figure>
        </aside>
    </div>

</body>

</html>
